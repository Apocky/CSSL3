[package]
name                   = "cssl-host-window"
description            = "CSSLv3 stage0 — Window host backend (Win32 + cfg-gated platform impls)"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true

[dependencies]
thiserror = { workspace = true }
bitflags  = { workspace = true }

# § T11-D78 (S7-F1) : windows-rs target-gated to Windows targets only. The Win32
# native window backend uses USER32 (window class registration / window create /
# message pump / DestroyWindow) + KERNEL32 (GetModuleHandle / DPI awareness via
# Shcore) + DWM hints. windows 0.58 + the matching Win32 feature-set is already
# present in the workspace cargo for cssl-host-d3d12 (T11-D66) ; this crate
# re-uses the workspace-pinned version and adds only the user/kernel features.
#
# Non-Windows builds skip the dep entirely so workspace `cargo check --workspace`
# stays green on Linux + macOS. Linux/X11+Wayland and macOS/Cocoa backends are
# deferred to a future F-axis slice ; the cfg-router in `backend.rs` returns
# `LoaderMissing` on non-Windows targets matching the cssl-host-d3d12 (T11-D66)
# + cssl-host-vulkan (T11-D65) precedent.
[target.'cfg(target_os = "windows")'.dependencies]
windows = { version = "0.58", features = [
    "Win32_Foundation",
    "Win32_Graphics_Gdi",
    "Win32_System_LibraryLoader",
    "Win32_System_SystemServices",
    "Win32_UI_HiDpi",
    "Win32_UI_Input_KeyboardAndMouse",
    "Win32_UI_WindowsAndMessaging",
] }

[lints]
workspace = true
