[package]
name                   = "cssl-mir"
description            = "CSSLv3 stage0 — MLIR-dialect bridge + structured MIR"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true

[lints]
workspace = true

[dependencies]
cssl-ast                       = { path = "../cssl-ast" }
cssl-hir                       = { path = "../cssl-hir" }
# T11-D138 (W3g-01) : the F5 IFC `EnforcesSigmaAtCellTouches` pass walks
# `cssl.fieldcell.*` ops + cross-references the per-op `consent_bits` /
# Sovereign / capacity-floor / reversibility-scope attributes against the
# canonical `ConsentBit` + `SigmaPolicy` + `ReversibilityScope` enums
# defined in `cssl-substrate-prime-directive::sigma`. Adding the dep
# here is a structural addition only ; no runtime / cgen behavior
# changes elsewhere. (Cyclic-dep check : substrate-prime-directive does
# NOT depend on cssl-mir, so this is safe.)
cssl-substrate-prime-directive = { path = "../cssl-substrate-prime-directive" }
thiserror                      = { workspace = true }

[dev-dependencies]
cssl-lex   = { path = "../cssl-lex" }
cssl-parse = { path = "../cssl-parse" }
