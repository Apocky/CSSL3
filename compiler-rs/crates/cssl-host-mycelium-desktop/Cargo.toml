[package]
name                   = "cssl-host-mycelium-desktop"
description            = "CSSLv3 Mycelium · the autonomous-local-agent for Apocky's-desktop · Tauri-2.x app · 3-mode-LLM-bridge · substrate-knowledge-embedded · cap-gated · sovereign-revoke-anytime · stage-0-self-sufficient"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true

# § T11-W10-MYCELIUM-DESKTOP wave-C1+B1+B2
# § PRIME-DIRECTIVE : default-deny · sovereign-revoke-anytime · ¬ surveillance · audit-on-mutation
# § STRUCTURAL : Tauri runtime is feature-gated behind `tauri-shell` ;
#   default workspace `cargo build` does NOT pull Tauri (200+ transitive deps).
# § Apocky-action : to enable real Tauri build, uncomment `tauri` dep below
#   and add "dep:tauri" to the `tauri-shell` feature ; see frontend/README.md.

[lib]
name       = "cssl_host_mycelium_desktop"
crate-type = ["rlib"]

# § tauri-shell binary is opt-in via feature ; absent from default workspace build.
[[bin]]
name              = "mycelium-tauri-shell"
path              = "src/bin/tauri_shell.rs"
required-features = ["tauri-shell"]

[features]
default     = []
# § T11-W14 · Apocky-greenlit Tauri activation (2026-05-01) · enables real Tauri runtime.
# Building with `--features tauri-shell` now compiles the full Tauri 2.x app.
tauri-shell = ["dep:tauri"]

[dependencies]
cssl-host-substrate-knowledge = { path = "../cssl-host-substrate-knowledge" }
cssl-host-llm-bridge          = { path = "../cssl-host-llm-bridge" }
cssl-host-agent-loop          = { path = "../cssl-host-agent-loop" }
# § T11-W14 · Tauri 2.x desktop-shell · feature-gated (¬ pulled by default workspace build).
tauri = { version = "2", optional = true , features = [] }
# § T11-W11-MYCELIUM-CHAT-SYNC : federate chat-pattern shapes across peers
#   so GM/DM persona-agents can learn shape-of-good-response from federated
#   instances WITHOUT ever observing raw player content. Σ-mask-gated.
cssl-mycelium-chat-sync       = { path = "../cssl-mycelium-chat-sync" }
# blake3 is needed for ChatSyncWire's local-emitter-handle derivation ;
# the builder-side hashing is in the chat-sync crate itself.
blake3     = { workspace = true }
serde      = { workspace = true }
serde_json = { workspace = true }
thiserror  = { workspace = true }
tracing    = { workspace = true }

[lints]
workspace = true
