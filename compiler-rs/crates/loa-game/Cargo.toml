[package]
name                   = "loa-game"
description            = "Labyrinth-of-Apockalypse — Phase-I game scaffold + M8 12-stage render-pipeline w/ per-stage frame-time instrumentation (T11-D158 W-Jζ-2)"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true

[lints]
workspace = true

# § T11-D96 (S9-I0) : LoA scaffold consumes the entire Phase-H Substrate +
# the Phase-F host backends. The crate exposes BOTH a library target (so the
# scaffold-smoke integration test imports the public scaffold types) AND a
# binary target (so `cargo run -p loa-game` opens a window + ticks the
# canonical 13-phase omega_step + saves state + replays it bit-equally).
#
# § T11-D158 (W-Jζ-2) : Per-stage frame-time instrumentation overlaid via
# `m8_integration` module + `metrics_mock` shim. Feature `metrics` toggles
# zero-overhead-when-off. Replay-determinism : timing observe-only.
#
# § FEATURE FLAGS
#   `test-bypass` propagates the cssl-substrate-prime-directive `test-bypass`
#   feature so tests + the binary entry-point can issue real CapTokens via
#   `caps_grant_for_test`. Production builds (without this feature) compile
#   but the scaffold's Substrate-touching paths refuse to grant caps — the
#   scaffold then exits via `LoaError::ConsentRefused`, which is the
#   PRIME-DIRECTIVE-canonical "stage-0 has no interactive UI" surface.
#   When the real consent-UI lands (post-S9-I0 ; Apocky-direction-needed)
#   the binary's `main()` will route through it and `test-bypass` will
#   shrink back to test-only.
#
#   `metrics` (default-on) : enables D158 per-stage timing instrumentation.
#   Disable via `--no-default-features` for zero-overhead production builds.
[features]
default     = ["metrics"]
test-bypass = ["cssl-substrate-prime-directive/test-bypass"]
metrics     = []

[dependencies]
# § Phase-H Substrate crates (all five, integrated).
cssl-substrate-omega-tensor    = { path = "../cssl-substrate-omega-tensor" }
cssl-substrate-omega-step      = { path = "../cssl-substrate-omega-step" }
cssl-substrate-projections     = { path = "../cssl-substrate-projections" }
cssl-substrate-save            = { path = "../cssl-substrate-save" }
cssl-substrate-prime-directive = { path = "../cssl-substrate-prime-directive" }

# § Phase-F host crates (window + input + audio + net).
cssl-host-window = { path = "../cssl-host-window" }
cssl-host-input  = { path = "../cssl-host-input" }
cssl-host-audio  = { path = "../cssl-host-audio" }
cssl-host-net    = { path = "../cssl-host-net" }

# § T11-D234 (D228-followup) : SDF-math-render path. The world-is-math maxim
# (Omniverse/07_AESTHETIC/00_EXOTICISM_PRINCIPLES.csl) demands every visible
# pixel be MATH-EVALUATED — clear-color + procedural-fill are forbidden.
# `cssl-render-v2` exposes the canonical CPU-side SDF raymarch surface
# (`SdfRaymarchPass::march` + `SdfComposition` + `AnalyticSdf::sphere/plane`)
# which the test-room renderer drives per-pixel. `cssl-pga` is needed for the
# `Plane` primitive used by the analytic plane-SDF.
cssl-render-v2 = { path = "../cssl-render-v2" }
cssl-pga       = { path = "../cssl-pga", default-features = false }

# § Workspace deps.
thiserror = { workspace = true }

# § T11-D228 (Phase-3) : Win32-target-gated GDI clear-color renderer for the
# test-room visible-pixels acceptance gate. The bin-only `test_room_render`
# module pulls Win32_Graphics_Gdi + Win32_UI_WindowsAndMessaging directly so
# the lib's `#![forbid(unsafe_code)]` contract stays untouched (the GDI
# unsafe-FFI lives only in the binary's module tree). HWND interop is via
# the `usize` exposed by `cssl-host-window::raw_handle`. Non-Windows builds
# skip the dep entirely (the renderer falls back to a no-op stub) so the
# workspace `cargo check --workspace` stays green on Linux + macOS per
# CSSLv3 R16 reproducibility-anchor.
#
# When `cssl-host-d3d12` ships a `Swapchain` helper a parallel D3D12 renderer
# path will land behind a `gpu` feature ; this dep stays as the no-GPU
# degraded-mode fallback.
[target.'cfg(target_os = "windows")'.dependencies]
windows = { version = "0.58", features = [
    "Win32_Foundation",
    "Win32_Graphics_Gdi",
    "Win32_UI_WindowsAndMessaging",
] }

[[bin]]
name = "loa-game"
path = "src/main.rs"

[lib]
name = "loa_game"
path = "src/lib.rs"

# § Integration test : the scaffold-smoke test exercises the canonical
# 13-phase omega_step end-to-end. It imports the library target's public
# API + drives one tick + saves+loads+replays. Required-features = test-bypass
# so the test issues real CapTokens via caps_grant_for_test ; production
# builds skip the test target.
[[test]]
name              = "scaffold_smoke"
path              = "tests/scaffold_smoke.rs"
required-features = ["test-bypass"]
