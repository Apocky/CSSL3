[package]
name                   = "cssl-host-vulkan"
description            = "CSSLv3 stage0 — Vulkan 1.4 host submission via ash (FFI)"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true

# § T11-D65 (S6-E1) : `ash` activated as FFI backend.
#   ash 0.38 ships Vulkan headers from the 1.3.281 SDK ; it dispatches
#   the Vulkan loader at runtime and supports any 1.4-capable ICD/driver
#   provided the loader is present (`vulkan-1.dll` on Windows /
#   `libvulkan.so.1` on Linux). 1.4-specific structs / fn-ptrs that ship
#   in the 1.4 headers but not yet in ash 0.38 can be reached via raw
#   `vkGetInstanceProcAddr` queries — but stage-0 only exercises the
#   subset that ash 0.38 already exposes (instance / physical-device /
#   device / queue / buffer / memory / compute-pipeline / cmd-buffer /
#   fence + the `debug_utils` extension for validation-layer routing).
[dependencies]
thiserror = { workspace = true }
ash       = { workspace = true }

[lints]
workspace = true
