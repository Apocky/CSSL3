<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSSL Playground</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --accent:  #58a6ff;
      --green:   #3fb950;
      --red:     #f85149;
      --yellow:  #d29922;
      --muted:   #8b949e;
      --text:    #c9d1d9;
      --mono:    "Cascadia Code", "Fira Code", "JetBrains Mono", monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--accent);
    }

    header .badge {
      font-size: 11px;
      background: #21262d;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      color: var(--muted);
    }

    .controls {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    select {
      background: #21262d;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 4px 8px;
      font-size: 13px;
      cursor: pointer;
    }

    button#run-btn {
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button#run-btn:hover { opacity: 0.85; }
    button#run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .pane-label {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      flex-shrink: 0;
    }

    #editor-pane {
      flex: 1;
      border-right: 1px solid var(--border);
    }

    #output-pane {
      width: 420px;
      flex-shrink: 0;
    }

    textarea#editor {
      width: 100%;
      flex: 1;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.6;
      border: none;
      outline: none;
      resize: none;
      padding: 14px 16px;
      tab-size: 4;
      height: 100%;
    }

    #output {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      font-family: var(--mono);
      font-size: 13px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      font-size: 12px;
      flex-shrink: 0;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }
    .status-dot.ok  { background: var(--green); }
    .status-dot.err { background: var(--red); }

    /* Output sections */
    .section {
      margin-bottom: 14px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stage-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .stage-chip {
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid transparent;
    }
    .stage-chip.ok  { background: #162012; border-color: #3fb95040; color: var(--green); }
    .stage-chip.err { background: #2c1e1e; border-color: #f8514940; color: var(--red); }

    .diag-list { display: flex; flex-direction: column; gap: 6px; }

    .diag {
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12.5px;
      line-height: 1.5;
    }
    .diag.error   { background: #2c1e1e; border-left: 3px solid var(--red); }
    .diag.warning { background: #2a2118; border-left: 3px solid var(--yellow); }
    .diag.note, .diag.help { background: #1a1f2e; border-left: 3px solid var(--accent); }

    .diag-severity {
      font-weight: 700;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.08em;
    }
    .diag.error   .diag-severity { color: var(--red); }
    .diag.warning .diag-severity { color: var(--yellow); }
    .diag.note    .diag-severity, .diag.help .diag-severity { color: var(--accent); }

    .diag-msg { color: var(--text); margin-top: 2px; }
    .diag-loc { color: var(--muted); font-size: 11px; margin-top: 2px; }
    .diag-notes { color: var(--muted); font-size: 11px; margin-top: 4px; }

    .items-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .item-chip {
      background: #21262d;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 12px;
    }

    .item-kind { color: var(--accent); }
    .item-name { color: var(--text); }

    .no-diags {
      color: var(--green);
      font-size: 13px;
    }

    .loading {
      color: var(--muted);
      font-style: italic;
    }

    .example-bar {
      padding: 4px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .example-bar span { color: var(--muted); }

    .example-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      padding: 2px 8px;
      font-size: 11px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .example-btn:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>

<header>
  <h1>CSSL Playground</h1>
  <span class="badge" id="version-badge">loading…</span>
  <div class="controls">
    <select id="surface-select" title="Surface syntax">
      <option value="auto">auto-detect</option>
      <option value="rust">rust-hybrid</option>
      <option value="csl">csl-native</option>
    </select>
    <button id="run-btn" disabled>Run</button>
  </div>
</header>

<div class="workspace">
  <div class="pane" id="editor-pane">
    <div class="pane-label">Source</div>
    <div class="example-bar">
      <span>examples:</span>
      <button class="example-btn" data-ex="fn">fn</button>
      <button class="example-btn" data-ex="struct">struct</button>
      <button class="example-btn" data-ex="enum">enum</button>
      <button class="example-btn" data-ex="effect">effect</button>
      <button class="example-btn" data-ex="multi">multi</button>
    </div>
    <textarea id="editor" spellcheck="false" placeholder="// Type CSSL code here…"></textarea>
  </div>

  <div class="pane" id="output-pane">
    <div class="pane-label">Output</div>
    <div id="output">
      <p class="loading">Initialising WASM…</p>
    </div>
    <div class="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">idle</span>
    </div>
  </div>
</div>

<script type="module">
import init, { compile, playground_version } from './pkg/cssl_playground.js';

const EXAMPLES = {
  fn: `fn add(a: i32, b: i32) -> i32 {
    a + b
}

fn main() {
    let result = add(3, 4);
}`,
  struct: `struct Point {
    x: f32,
    y: f32,
}

struct Color {
    r: u8,
    g: u8,
    b: u8,
    a: u8,
}`,
  enum: `enum Shape {
    Circle { radius: f32 },
    Rect { width: f32, height: f32 },
    Triangle { base: f32, height: f32 },
}

fn area(s: Shape) -> f32 {
    match s {
        Shape::Circle { radius } => 3.14159 * radius * radius,
        Shape::Rect { width, height } => width * height,
        Shape::Triangle { base, height } => 0.5 * base * height,
    }
}`,
  effect: `effect Log {
    fn log(msg: str) -> ();
}

effect Fail {
    fn fail(msg: str) -> !;
}

fn safe_div(a: f64, b: f64) -> f64 ! Fail {
    if b == 0.0 {
        fail("division by zero")
    } else {
        a / b
    }
}`,
  multi: `struct Vec3 {
    x: f32,
    y: f32,
    z: f32,
}

fn dot(a: Vec3, b: Vec3) -> f32 {
    a.x * b.x + a.y * b.y + a.z * b.z
}

fn length(v: Vec3) -> f32 {
    let d = dot(v, v);
    sqrt(d)
}

enum Maybe<T> {
    Some(T),
    None,
}

fn normalize(v: Vec3) -> Maybe<Vec3> {
    let len = length(v);
    if len == 0.0 {
        Maybe::None
    } else {
        Maybe::Some(Vec3 { x: v.x / len, y: v.y / len, z: v.z / len })
    }
}`
};

const editor    = document.getElementById('editor');
const runBtn    = document.getElementById('run-btn');
const output    = document.getElementById('output');
const statusDot = document.getElementById('status-dot');
const statusTxt = document.getElementById('status-text');
const surface   = document.getElementById('surface-select');
const verBadge  = document.getElementById('version-badge');

let wasmReady = false;

async function boot() {
  try {
    await init();
    wasmReady = true;
    runBtn.disabled = false;
    verBadge.textContent = 'v' + playground_version();
    setStatus('ready', 'ok');
    output.innerHTML = '<p style="color:var(--muted);font-size:13px;">WASM loaded — type code and press <kbd style="background:#21262d;border:1px solid #30363d;border-radius:3px;padding:1px 5px;font-size:11px">Run</kbd>.</p>';
  } catch (e) {
    setStatus('WASM load failed: ' + e.message, 'err');
    output.innerHTML = `<p style="color:var(--red)">Failed to load WASM: ${e.message}</p>`;
  }
}

function setStatus(msg, cls) {
  statusTxt.textContent = msg;
  statusDot.className = 'status-dot ' + (cls || '');
}

function run() {
  if (!wasmReady) return;
  const src = editor.value;
  const hint = surface.value;
  let result;
  try {
    result = JSON.parse(compile(src, hint));
  } catch (e) {
    setStatus('internal error: ' + e.message, 'err');
    return;
  }
  renderResult(result);
}

function renderResult(r) {
  const ok = r.ok;
  setStatus(
    ok ? `ok — ${r.item_count} items, ${r.token_count} tokens` : 'errors',
    ok ? 'ok' : 'err'
  );

  let html = '';

  // ── pipeline stages ──
  html += '<div class="section">';
  html += '<div class="section-title">Pipeline</div>';
  html += '<div class="stage-row">';
  for (const [stage, pass] of Object.entries(r.stages)) {
    html += `<span class="stage-chip ${pass ? 'ok' : 'err'}">${stage}</span>`;
  }
  html += '</div></div>';

  // ── diagnostics ──
  html += '<div class="section">';
  html += '<div class="section-title">Diagnostics</div>';
  if (!r.diagnostics || r.diagnostics.length === 0) {
    html += '<p class="no-diags">✓ No diagnostics</p>';
  } else {
    html += '<div class="diag-list">';
    for (const d of r.diagnostics) {
      const sev = d.severity || 'note';
      html += `<div class="diag ${sev}">`;
      html += `<div class="diag-severity">${sev}</div>`;
      html += `<div class="diag-msg">${escHtml(d.message)}</div>`;
      if (d.span) {
        html += `<div class="diag-loc">line ${d.span.line}, col ${d.span.col} (bytes ${d.span.start}–${d.span.end})</div>`;
      }
      if (d.notes && d.notes.length > 0) {
        html += `<div class="diag-notes">${d.notes.map(escHtml).join(' · ')}</div>`;
      }
      html += '</div>';
    }
    html += '</div>';
  }
  html += '</div>';

  // ── items ──
  if (r.items && r.items.length > 0) {
    html += '<div class="section">';
    html += `<div class="section-title">Items (${r.item_count})</div>`;
    html += '<div class="items-grid">';
    for (const it of r.items) {
      html += `<span class="item-chip"><span class="item-kind">${escHtml(it.kind)}</span> <span class="item-name">${escHtml(it.name ?? '(anon)')}</span></span>`;
    }
    html += '</div></div>';
  }

  output.innerHTML = html;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── example buttons ──
document.querySelectorAll('.example-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const ex = btn.dataset.ex;
    if (EXAMPLES[ex]) {
      editor.value = EXAMPLES[ex];
      if (wasmReady) run();
    }
  });
});

// ── key binding: Ctrl/Cmd + Enter to run ──
editor.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    run();
  }
  // Tab → spaces
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editor.selectionStart;
    const end = editor.selectionEnd;
    editor.value = editor.value.substring(0, s) + '    ' + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = s + 4;
  }
});

runBtn.addEventListener('click', run);

// ── load example on start ──
editor.value = EXAMPLES.fn;

boot();
</script>
</body>
</html>
