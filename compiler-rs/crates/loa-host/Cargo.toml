[package]
name                   = "loa-host"
description            = "CSSLv3 stage-0 LoA-v13 host runtime — winit window + wgpu render + WASD navigation + DM/GM runtime + MCP TCP server. Apocky-greenlit hybrid : scenes/*.cssl stay authoritative ; this Rust crate is the bootstrap host."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true

# § ARCHITECTURE — two layers (matches cssl-host-webgpu pattern @ T11-D68)
#
#   Phase-1 (default) : catalog modules (camera + geometry + input + movement
#     + physics + dm_director + gm_narrator + dm_runtime + mcp_server +
#     mcp_tools) carry pure-CPU logic WITHOUT pulling winit/wgpu. Compiles
#     in the workspace's pinned 1.85.0 GNU toolchain.
#
#   Phase-2 (`runtime` feature) : pulls winit 0.30 + wgpu 23 + pollster.
#     Compile + run on Apocky's host with :
#       cargo +stable-x86_64-pc-windows-msvc run -p loa-host --features runtime --release
#
# § Modules (combined from 4 W-LOA-host-* sibling slices)
#   - W-LOA-host-render : window + gpu + render + geometry + camera + main
#   - W-LOA-host-input  : input + movement + physics
#   - W-LOA-host-mcp    : mcp_server + mcp_tools (TCP JSON-RPC)
#   - W-LOA-host-dm     : dm_director + gm_narrator + dm_runtime

[features]
default = []
runtime = ["dep:wgpu", "dep:winit", "dep:pollster"]

[dependencies]
cssl-rt                         = { path = "../cssl-rt" }
# § T11-LOA-FID-SPECTRAL : substrate's hyperspectral pipeline. Used by
# `spectral_bridge` to bake per-material 16-band reflectance × 4 canonical
# illuminants → sRGB albedo for the GPU material LUT. Catalog-buildable
# (pure-Rust ; no GPU deps).
cssl-spectral-render            = { path = "../cssl-spectral-render" }
# § T11-LOA-FID-CFER : substrate-IS-renderer wiring. The CFER pipeline
# pulls FieldCell + OmegaField + (later) per-cell KAN modulation directly
# from the canonical substrate crates so the ω-field literally drives the
# volumetric pass. SigmaMaskPacked is needed for the atmospheric-region
# Modify-grant that lets per-frame perturbations write through the
# canonical Σ-checked surface.
cssl-substrate-omega-field      = { path = "../cssl-substrate-omega-field" }
cssl-substrate-omega-step       = { path = "../cssl-substrate-omega-step" }
cssl-substrate-loa-kan          = { path = "../cssl-substrate-loa-kan" }
cssl-substrate-prime-directive  = { path = "../cssl-substrate-prime-directive" }
bytemuck                        = { workspace = true }
glam                            = { version = "0.25", features = ["bytemuck"] }
serde                           = { workspace = true }
serde_json                      = { workspace = true }
# § T11-LOA-TEST-APP : `png` 0.17 — pure-Rust PNG encoder/decoder, no C
# deps, vetted (~5M crates.io downloads/year). Used by the snapshot
# module to write framebuffer readbacks to disk for visual regression
# testing. Catalog-buildable (no GPU needed for encode/decode itself).
png        = "0.17"

# Phase-2 (runtime) : optional deps pulled when --features runtime.
winit      = { version = "0.30", optional = true }
wgpu       = { workspace = true, features = ["wgsl", "dx12", "vulkan-portability"], optional = true }
pollster   = { version = "0.3", optional = true }

[dev-dependencies]
naga       = { workspace = true }

[lints]
workspace = true

[lib]
# § T11-LOA-PURE-CSSL : staticlib added so csslc can link the engine into a
# pure-CSSL `main.cssl` via the `__cssl_engine_run` FFI symbol. rlib stays for
# the historical `loa-runtime` bin + downstream Rust consumers.
name       = "loa_host"
path       = "src/lib.rs"
crate-type = ["staticlib", "rlib"]

[[bin]]
name = "loa-runtime"
path = "src/main.rs"
