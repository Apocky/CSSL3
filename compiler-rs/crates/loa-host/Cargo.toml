[package]
name                   = "loa-host"
description            = "CSSLv3 stage-0 LoA-v13 host runtime — winit window + wgpu render + WASD navigation + DM/GM runtime + MCP TCP server. Apocky-greenlit hybrid : scenes/*.cssl stay authoritative ; this Rust crate is the bootstrap host."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true

# § ARCHITECTURE — two layers (matches cssl-host-webgpu pattern @ T11-D68)
#
#   Phase-1 (default) : catalog modules (camera + geometry + input + movement
#     + physics + dm_director + gm_narrator + dm_runtime + mcp_server +
#     mcp_tools) carry pure-CPU logic WITHOUT pulling winit/wgpu. Compiles
#     in the workspace's pinned 1.85.0 GNU toolchain.
#
#   Phase-2 (`runtime` feature) : pulls winit 0.30 + wgpu 23 + pollster.
#     Compile + run on Apocky's host with :
#       cargo +stable-x86_64-pc-windows-msvc run -p loa-host --features runtime --release
#
# § Modules (combined from 4 W-LOA-host-* sibling slices)
#   - W-LOA-host-render : window + gpu + render + geometry + camera + main
#   - W-LOA-host-input  : input + movement + physics
#   - W-LOA-host-mcp    : mcp_server + mcp_tools (TCP JSON-RPC)
#   - W-LOA-host-dm     : dm_director + gm_narrator + dm_runtime

[features]
default = []
runtime = ["dep:wgpu", "dep:winit", "dep:pollster"]

[dependencies]
cssl-rt                         = { path = "../cssl-rt" }
# § T11-LOA-FID-SPECTRAL : substrate's hyperspectral pipeline. Used by
# `spectral_bridge` to bake per-material 16-band reflectance × 4 canonical
# illuminants → sRGB albedo for the GPU material LUT. Catalog-buildable
# (pure-Rust ; no GPU deps).
cssl-spectral-render            = { path = "../cssl-spectral-render" }
# § T11-LOA-FID-CFER : substrate-IS-renderer wiring. The CFER pipeline
# pulls FieldCell + OmegaField + (later) per-cell KAN modulation directly
# from the canonical substrate crates so the ω-field literally drives the
# volumetric pass. SigmaMaskPacked is needed for the atmospheric-region
# Modify-grant that lets per-frame perturbations write through the
# canonical Σ-checked surface.
cssl-substrate-omega-field      = { path = "../cssl-substrate-omega-field" }
cssl-substrate-omega-step       = { path = "../cssl-substrate-omega-step" }
cssl-substrate-loa-kan          = { path = "../cssl-substrate-loa-kan" }
cssl-substrate-prime-directive  = { path = "../cssl-substrate-prime-directive" }
# § T11-W5c-LOA-HOST-WIRE — wave-3γ + W4 + W5a + W5b crates wired into the
# loa-host catalog so wrapper modules + MCP tools can re-export their
# surfaces. All path-deps ; no version pin (workspace-managed).
cssl-host-replay                = { path = "../cssl-host-replay" }
cssl-host-audit                 = { path = "../cssl-host-audit" }
cssl-host-stereoscopy           = { path = "../cssl-host-stereoscopy" }
cssl-host-golden                = { path = "../cssl-host-golden" }
cssl-host-procgen-rooms         = { path = "../cssl-host-procgen-rooms" }
cssl-host-histograms            = { path = "../cssl-host-histograms" }
cssl-host-attestation           = { path = "../cssl-host-attestation" }
cssl-host-rt-trace              = { path = "../cssl-host-rt-trace" }
cssl-host-spectral-grader       = { path = "../cssl-host-spectral-grader" }
cssl-host-frame-recorder        = { path = "../cssl-host-frame-recorder" }
cssl-host-input-virtual         = { path = "../cssl-host-input-virtual" }
cssl-host-config                = { path = "../cssl-host-config" }
cssl-host-cocreative            = { path = "../cssl-host-cocreative" }
cssl-host-causal-seed           = { path = "../cssl-host-causal-seed" }
cssl-host-license-attribution   = { path = "../cssl-host-license-attribution" }
cssl-host-voice                 = { path = "../cssl-host-voice" }
cssl-host-multiplayer-signaling = { path = "../cssl-host-multiplayer-signaling" }
# § T11-W7-G-LOA-HOST-WIRE — wave-7 path-deps (KAN-real · DM · GM · MP-transport-real).
#   All path-deps ; workspace-managed ; surface re-exported via `wired_*` modules
#   so the 4 new MCP tools can probe cap-tables + canary-check without each
#   call-site reaching across the path-dep.
cssl-host-kan-real              = { path = "../cssl-host-kan-real" }
cssl-host-mp-transport-real     = { path = "../cssl-host-mp-transport-real" }
cssl-host-dm                    = { path = "../cssl-host-dm" }
cssl-host-gm                    = { path = "../cssl-host-gm" }
# § T11-W8-CHAT-WIRE : Coder narrow-orchestrator path-dep. Powers the
# 4 NEW `coder.*` MCP tools (propose_edit · list_pending · approve · revert).
# Sandboxed AST-edit runtime ; sovereign-required for substrate edits ;
# 30-second auto-revert window. ALL stage-0 explicit-confirm-only ; ¬ stage-1
# (deferred-indefinitely-per-spec/10).
cssl-host-coder-runtime         = { path = "../cssl-host-coder-runtime" }
# § T11-W11-HOTFIX-INFRA : live-update infrastructure (NEW Wave 11).
#   apocky.com manifest-of-truth + mycelium-byte-CDN + 9 channels +
#   5 cap-keys + Σ-mask-default-deny. The `wired_hotfix` module exposes
#   `start_hotfix_loop(...)` which the engine integrator wires from
#   main.rs (sibling-agent-territory).
cssl-hotfix                     = { path = "../cssl-hotfix" }
cssl-hotfix-client              = { path = "../cssl-hotfix-client" }
bytemuck                        = { workspace = true }
glam                            = { version = "0.25", features = ["bytemuck"] }
serde                           = { workspace = true }
serde_json                      = { workspace = true }
# § T11-LOA-TEST-APP : `png` 0.17 — pure-Rust PNG encoder/decoder, no C
# deps, vetted (~5M crates.io downloads/year). Used by the snapshot
# module to write framebuffer readbacks to disk for visual regression
# testing. Catalog-buildable (no GPU needed for encode/decode itself).
png        = "0.17"
# § T11-WAVE3-GLTF : `gltf` 1.4 — pure-Rust glTF 2.0 importer (no native
# deps · widely vetted). Pulls JSON + binary buffer parsing for `.glb`
# / `.gltf` files. Used by `gltf_loader` to convert external 3D-model
# files into the loa-host `Vertex` struct for dynamic-mesh upload.
# `default-features = false` strips image-decoding (which would pull
# the `image` crate that requires rust 1.88) ; `import` enables the
# file-system reader path · `utils` enables `prim.reader(...)` for
# attribute iteration · `names` lets us log mesh names.
gltf       = { version = "1.4", default-features = false, features = ["import", "utils", "names"] }

# Phase-2 (runtime) : optional deps pulled when --features runtime.
winit      = { version = "0.30", optional = true }
wgpu       = { workspace = true, features = ["wgsl", "dx12", "vulkan-portability"], optional = true }
pollster   = { version = "0.3", optional = true }

[dev-dependencies]
naga       = { workspace = true }

[lints]
workspace = true

[lib]
# § T11-LOA-PURE-CSSL : staticlib added so csslc can link the engine into a
# pure-CSSL `main.cssl` via the `__cssl_engine_run` FFI symbol. rlib stays for
# the historical `loa-runtime` bin + downstream Rust consumers.
name       = "loa_host"
path       = "src/lib.rs"
crate-type = ["staticlib", "rlib"]

[[bin]]
name = "loa-runtime"
path = "src/main.rs"
