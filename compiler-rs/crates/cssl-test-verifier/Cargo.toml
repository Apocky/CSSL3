[package]
name                   = "cssl-test-verifier"
description            = "CSSLv3 stage0 — event-trace verifier : load CSSL/CSL-native event-manifest + JSONL trace from cssl-rt, compare, report pass/fail. Stage-0 hosted in Rust ; post-stage-0 migrates to CSSL source."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true

[lints]
workspace = true

[[bin]]
name = "cssl-test-verify"
path = "src/main.rs"

[lib]
name = "cssl_test_verifier"
path = "src/lib.rs"

[dependencies]
serde       = { workspace = true }
serde_json  = { workspace = true }
thiserror   = { workspace = true }
