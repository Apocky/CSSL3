[package]
name                   = "cssl-rt"
description            = "CSSLv3 stage0 — runtime library"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true

# § T11-D319 (W-CSSL-default-link) : produce staticlib in addition to rlib so
# csslc can default-link cssl-rt into every produced .exe. The rlib stays for
# downstream rust consumers (cssl-playground / tests) ; the staticlib is the
# `lib<name>.lib` (Windows-MSVC) / `lib<name>.a` (Unix) artifact csslc reaches
# for via auto-discovery in `csslc::linker::discover_cssl_rt_staticlib`. The
# `loa_startup.rs` ctor (`.CRT$XCU` / `.init_array`) only fires when the
# staticlib is in the link command, hence default-link.
[lib]
name       = "cssl_rt"
crate-type = ["rlib", "staticlib"]

[dependencies]
# § T11-D130 : path-hash discipline requires BLAKE3 + OS RNG. Both are
# already workspace-deps used by cssl-telemetry ; cssl-rt links them
# directly to keep the FFI surface free of cssl-telemetry coupling
# (the runtime is the lower layer ; depending on telemetry would invert
# the dependency direction).
blake3 = { workspace = true }
rand   = { workspace = true }
# § T11-WAVE3-HTTP : ureq blocking HTTP client backs the `__cssl_http_*`
# FFI surface in `crate::http`. Default-features OFF so the base build is
# plain-http only (free-asset CDN endpoints) ; the `tls` feature enables
# rustls and turns on https:// support. The cap-bit `NET_HTTPS_ONLY`
# rejects plain http URLs at runtime ; flipping it on without enabling
# `tls` here means every call returns -EACCES, which is the correct
# default-deny posture per PRIME-DIRECTIVE.
ureq = { workspace = true }

# § T11-W19-β-RT-DELEG-WINDOW : delegate cssl-rt::host_window to the real
# Win32 backend. The cssl-host-window crate gates its windows-rs dep on
# target_os = "windows" itself ; on non-Windows this dep contributes only
# the cross-platform error/event/raw-handle types + LoaderMissing returns.
cssl-host-window = { path = "../cssl-host-window" }
# § T11-W19-β-RT-DELEG-INPUT : delegate cssl-rt::host_input to the real
# Win32 raw-input + XInput backend (Linux evdev + macOS IOKit cfg-gated
# inside cssl-host-input itself ; the active backend is selected by
# target_os).
cssl-host-input = { path = "../cssl-host-input" }
# § T11-W19-β-RT-DELEG-GPU : delegate cssl-rt::host_gpu to the real
# D3D12 + DXGI 1.6 backend on Windows. On non-Windows targets the
# downstream calls return LoaderMissing per cssl-host-d3d12 precedent.
cssl-host-d3d12 = { path = "../cssl-host-d3d12" }

[features]
# § Default = no TLS · stage-0 ships plain-http only · cap-bit NET_HTTPS_ONLY
# blocks runtime-side until `tls` feature flipped on at the crate boundary.
default = []
tls     = ["ureq/tls"]

[lints]
workspace = true
