[package]
name                   = "cssl-host-d3d12"
description            = "CSSLv3 stage0 — D3D12 host submission via windows-rs (FFI)"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true

[dependencies]
thiserror = { workspace = true }

# § T11-D66 (S6-E2) : windows-rs target-gated to Windows targets only. Non-Windows
# builds skip the dep entirely so the workspace `cargo check --workspace` stays
# green on Linux + macOS. The features list is the minimum needed for D3D12 +
# DXGI 1.6 + diagnostics : factory enum, device + queue + list + heap +
# rootsig + PSO + fence + DRED + InfoQueue.
[target.'cfg(target_os = "windows")'.dependencies]
windows = { version = "0.58", features = [
    "Win32_Foundation",
    "Win32_Graphics_Direct3D",
    "Win32_Graphics_Direct3D12",
    "Win32_Graphics_Dxgi",
    "Win32_Graphics_Dxgi_Common",
    "Win32_Security",
    "Win32_System_Threading",
] }

[lints]
workspace = true
