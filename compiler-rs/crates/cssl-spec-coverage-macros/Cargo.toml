[package]
name                   = "cssl-spec-coverage-macros"
description            = "CSSLv3 stage0 — Proc-macro companion to cssl-spec-coverage. Provides #[spec_anchor(...)] attribute (T11-D160 / Wave-Jζ-4)."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true

[lints]
workspace = true

[lib]
proc-macro = true

[dependencies]
proc-macro2 = "1"
quote       = "1"
syn         = { version = "2", features = ["full", "extra-traits"] }
