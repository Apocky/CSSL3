[package]
name                   = "cssl-spec-coverage-macros"
description            = "CSSLv3 stage0 — Proc-macro companion to cssl-spec-coverage. Provides #[spec_anchor(...)] attribute (T11-D160 / Wave-Jζ-4)."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true

[lints]
workspace = true

[lib]
proc-macro = true
# § Disable lib-test linkage for this proc-macro crate. Default `test = true`
# attempts to link an empty test-binary that on the gnu-toolchain invokes
# `dlltool.exe` (absent in this environment) ; the crate has no inline tests.
# Test coverage for the proc-macro lives in the consumer crate
# `cssl-spec-coverage` (tests/proc_macro_smoke.rs).
test = false

[dependencies]
proc-macro2 = "1"
quote       = "1"
syn         = { version = "2", features = ["full", "extra-traits"] }
