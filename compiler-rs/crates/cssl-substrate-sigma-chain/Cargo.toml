[package]
name                   = "cssl-substrate-sigma-chain"
description            = "CSSLv3 substrate — Σ-Chain BOOTSTRAP distributed-ledger primitive · stage-0 single-node-mode + federation-skeleton · BLAKE3 incremental Merkle tree · Ed25519 signed entries · monotonic seq_no · checkpoint-every-1024 · O(log N) append+prove · NO PoW · NO PoS · NO gas · sovereign-rollback-via-checkpoint-rewind · Coherence-Proof = deterministic-replay-from-genesis-or-checkpoint. Anchors hotfix-bundle-sigs · Σ-mask cap-grants/revokes · mycelium chat-pattern federation · substrate-knowledge ingestion. Implements specs/28_SIGMA_CHAIN_BOOTSTRAP.csl per spec/14 + spec/15."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true

# § T11-W11-SIGMA-CHAIN : Σ-Chain bootstrap · substrate-tier ledger primitive
# §§ axioms (t∞) :
#     A-1 ¬ PoW · A-2 ¬ PoS · A-3 ¬ gas · A-4 ¬ majority-override-sovereignty
#     A-5 ✓ append-only · A-6 ✓ Ed25519-signed-entries · A-7 ✓ BLAKE3-Merkle-rooted
#     A-8 ✓ monotonic-gapless-seq_no · A-9 ✓ Coherence-Proof = deterministic-replay
#     A-10 ✓ sovereign-rollback-via-checkpoint-rewind · A-11 ✓ stage-0-single-node-mode
# §§ pipeline : sibling-attests → record_attestation() → entry-sign → merkle-append → checkpoint?
# §§ verify : ed25519-verify(sig) ∧ prev_root-match ∧ replay-derive-root ∧ final-root-equal-claimed
# §§ disjoint-from cssl-host-sigma-chain : that crate is HOST-tier event-emitter (privacy-tiers · BTreeMap) ;
#     this crate is SUBSTRATE-tier append-only-log (incremental Merkle · seq_no · checkpoints · federation-skel)

