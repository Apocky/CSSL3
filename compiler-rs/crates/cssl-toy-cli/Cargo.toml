[package]
name         = "cssl-toy-cli"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true
description  = "CSSLv3 end-to-end toy-CLI : S-exp parse → cssl-elab → cssl-pd-check → report (Wave U-D prelude per specs/Upgrade/impl/IMPL_01_PLAN.csl ; integration-tier per IMPL_05 T-4)."
repository.workspace   = true

[[bin]]
name = "cssl-toy"
path = "src/main.rs"

[dependencies]
cssl-elab          = { path = "../cssl-elab" }
cssl-effects-row   = { path = "../cssl-effects-row" }
cssl-pd-check      = { path = "../cssl-pd-check" }
cssl-ocap          = { path = "../cssl-ocap" }
cssl-consent       = { path = "../cssl-consent" }
cssl-cas           = { path = "../cssl-cas" }
cssl-iccombs       = { path = "../cssl-iccombs" }
cssl-lower-iccombs = { path = "../cssl-lower-iccombs" }
rand.workspace     = true

[lints]
workspace = true
