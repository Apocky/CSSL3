thiserror = { workspace = true }
# § Telemetry hook uses std::sync::RwLock (const-fn since Rust 1.63) rather than
# parking_lot. The workspace's MinGW-less toolchain (T11-D20 R16-anchor) cannot
# build parking_lot_core's import-libs without dlltool.exe ; the same constraint
# documented in cssl-host-webgpu's wgpu-runtime feature gating. std::sync is
# build-everywhere ; the hook-invocation path is cold (one read-lock per
# debug-camera access), so the perf delta vs parking_lot is negligible.
